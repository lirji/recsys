# 本仓库全部容器编排的单一入口(本文件在 docker/ 目录下,故所有相对路径以 ../ 指向仓库根)。
# 一键(推荐):从仓库根跑 `scripts/dev-local.sh up`(基础设施 + 8 个 app 全部容器化 + 健康检查),
#             或直接 `cd docker && docker compose --profile apps --profile console up -d --build`。
#
# 按 profile 分层启动(cd docker 后,或加 -f docker/docker-compose.yml):
#   (默认)             postgres + redis —— 只起基础存储
#   --profile full      追加 kafka + nacos
#   --profile apps      追加 8 个 Java 服务(全链路容器化;仅 gateway 对宿主暴露端口)
#   --profile console   追加前端 nginx(SPA + 反代 /api)
#   --profile obs       追加 prometheus + grafana + tempo + alertmanager(观测)
# 所有对宿主暴露的端口都可用环境变量覆盖(见 docker/.env.example;本机端口冲突时 dev-local.sh 会注入)。
#   Grafana: http://localhost:${GRAFANA_PORT:-3001} (admin/admin),已预置数据源 + 推荐在线看板
services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: recsys-postgres
    # 全栈 8 个服务多池(主库 + ShardingSphere ds_0/ds_1 + 派生向量库)并发会打满 pg 默认
    # max_connections=100(FATAL: too many clients)→ 抬到 500 供全链路容器化下的连接需求。
    command: ["postgres", "-c", "max_connections=500"]
    environment:
      # P0 凭据外部化:默认值仅供本地 dev;生产/共享环境用 .env 覆盖(勿提交真实密钥)。
      POSTGRES_DB: ${PG_DB:-recsys}
      POSTGRES_USER: ${PG_USER:-recsys}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-recsys}
    ports:
      - "${PG_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # 首次启动自动建表(schema + 索引 + 分库 ds_1 引导);sql/ 在仓库根,compose 在 docker/ 故用 ../
      # 其中 04b_ds1_bootstrap.sql 自动建 recsys_ds1 + 分片骨架(容器化必需,否则分片服务启动即挂)。
      - ../recsys-offline/sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recsys -d recsys"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: recsys-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ---- 细粒度判权(统一权限平台):docker compose --profile authz up -d 才启动 ----
  # recsys 专属 SpiceDB 实例(§B 每项目独立,不与 auth-platform 自己的 :8543 共用)。
  # dev 用内存 datastore(重启丢数据,fixture 可重灌:auth-platform/deploy/recsys-authz-fixture.sh);
  # 判权服务(auth-platform-server :8210)从 auth-platform 仓库起,见 docs/09-权限接入auth-platform.md。
  spicedb:
    image: authzed/spicedb:latest
    container_name: recsys-spicedb
    profiles: ["authz"]
    command: serve
    environment:
      SPICEDB_GRPC_PRESHARED_KEY: ${RECSYS_SPICEDB_KEY:-recsys_dev_key}
      SPICEDB_DATASTORE_ENGINE: memory
      SPICEDB_HTTP_ENABLED: "true"
    ports:
      - "${RECSYS_SPICEDB_HTTP_PORT:-8544}:8443"
      - "${RECSYS_SPICEDB_GRPC_PORT:-50052}:50051"

  # ---- 可选组件:docker compose --profile full up -d 才启动 ----
  # 官方 Apache Kafka 镜像(KRaft 单节点;Bitnami 已下架旧 tag)。Java 服务跑宿主机经 localhost:9092 连。
  kafka:
    image: apache/kafka:3.7.1
    container_name: recsys-kafka
    profiles: ["full"]
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: controller,broker
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "${KAFKA_PORT:-9092}:9092"

  nacos:
    # v2.4.3 起有原生 arm64 多架构镜像(v2.3.2 仅 amd64,Apple Silicon 上模拟会卡死);standalone 内嵌 Derby。
    image: nacos/nacos-server:v2.4.3
    container_name: recsys-nacos
    # apps profile 也需要 Nacos(服务注册发现 + rec-engine 配置中心),故一并纳入。
    profiles: ["full", "apps"]
    environment:
      MODE: standalone
    ports:
      - "${NACOS_PORT:-8848}:8848"
      - "${NACOS_GRPC_PORT:-9848}:9848"

  # ---- 观测性:docker compose --profile obs up -d 才启动 ----
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: recsys-prometheus
    profiles: ["obs"]
    extra_hosts:
      # Linux 上需要;macOS/Windows 的 Docker Desktop 已内置 host.docker.internal
      - "host.docker.internal:host-gateway"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"

  # P2 分布式追踪后端:接收各服务 OTLP span(宿主 Java 服务 → localhost:4318),Grafana 按 traceId 钻取跨进程链路
  tempo:
    image: grafana/tempo:2.6.0
    container_name: recsys-tempo
    profiles: ["obs"]
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ./monitoring/tempo.yaml:/etc/tempo/tempo.yaml:ro
    ports:
      - "3200:3200"   # Tempo 查询 API(Grafana 数据源用)
      - "4318:4318"   # OTLP HTTP 接收端

  # 告警路由(SLO 告警的通知面);教学默认不外发,UI 在 :9093
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: recsys-alertmanager
    profiles: ["obs"]
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "${ALERTMANAGER_PORT:-9093}:9093"

  # P2:告警接收演示端——Alertmanager 把告警 POST 到这里,容器日志即可见(`docker logs recsys-webhook-logger`)。
  # 演示生产 Slack/钉钉/飞书 投递的等价物,不接真实外部服务。
  webhook-logger:
    image: mendhak/http-https-echo:34
    container_name: recsys-webhook-logger
    profiles: ["obs"]
    environment:
      HTTP_PORT: "5001"
    ports:
      - "5001:5001"

  grafana:
    image: grafana/grafana:11.2.0
    container_name: recsys-grafana
    profiles: ["obs"]
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      # 宿主机 3000 常被占(docker-proxy 残留),映射到 3001 规避
      - "${GRAFANA_PORT:-3001}:3000"

  # ---- 控制台前端:docker compose --profile console up -d 才启动 ----
  # 前后端分离后前端独立为 console/ 工程;此服务用 nginx 同源托管构建产物 + 反代 /api 到宿主机上的网关。
  # dev 阶段无需它,直接 `cd console && npm run dev`(Vite :5173 proxy 到 :8080)即可。
  console:
    build:
      context: ../console
      # 认证模式构建期烘焙(Vite VITE_* 编译期内联)。切 oidc:CONSOLE_AUTH_MODE=oidc 且网关同步
      # RECSYS_EDGE_CASDOOR=true(成对开关,见 docs/09);issuer 需浏览器可达(容器化时勿用容器名)。
      args:
        VITE_AUTH_MODE: ${CONSOLE_AUTH_MODE:-legacy}
        VITE_CASDOOR_ISSUER: ${CASDOOR_ISSUER:-http://localhost:8000}
        VITE_CASDOOR_CLIENT_ID: ${CASDOOR_CONSOLE_CLIENT_ID:-ragshared0client00000001-org-recsys}
    container_name: recsys-console-web
    profiles: ["console"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # 全部容器化(apps+console)时前端 nginx 与 gateway 同网络,直连容器;单独 --profile console 也会带起 gateway。
    depends_on:
      - gateway
    environment:
      # 默认打同网络的 gateway 容器(全链路容器化);若后端仍在宿主机 mvn,覆盖为
      #   RECSYS_GATEWAY=http://host.docker.internal:${GATEWAY_PORT:-8080}
      RECSYS_GATEWAY: ${RECSYS_GATEWAY:-http://gateway:8080}
    ports:
      - "${CONSOLE_WEB_PORT:-8095}:80"

  # ---- 在线服务容器(P0 微服务化):docker compose --profile apps up -d ----
  # 参数化 Dockerfile(MODULE/PORT)构建各 fat jar,全部接入 Nacos 服务发现(NACOS_DISCOVERY=true),
  # 网关以 discovery profile 走 lb://。同网络内 PG=postgres:5432 / REDIS=redis / NACOS=nacos:8848(用服务名)。
  # 仅网关对宿主暴露(:8080=统一入口);其余服务内部互通(经 Nacos lb:// 与容器 DNS)。
  # 前端 console/(--profile console)把 RECSYS_GATEWAY 指向本网关即可全链路容器化(改成 http://gateway:8080)。
  gateway:
    build:
      # 构建上下文=仓库根(Dockerfile 需要全部 pom + 源码);compose 在 docker/ 子目录故 context 指向上级。
      context: ..
      dockerfile: docker/Dockerfile
      args:
        MODULE: recsys-gateway
        PORT: 8080
    container_name: recsys-gateway
    profiles: ["apps"]
    depends_on:
      nacos:
        condition: service_started
    environment:
      NACOS_ADDR: nacos:8848
      NACOS_DISCOVERY: "true"
      # 路由默认即 lb://(见 recsys-gateway application.yml);无 Nacos 才需 SPRING_PROFILES_ACTIVE=static
      SERVER_PORT: 8080
      # 一键 dev 栈默认关安全(否则 /api/advertiser·/api/search-ads 等经网关 401);生产置 true 并注入密钥
      RECSYS_SECURITY_ENABLED: "${RECSYS_SECURITY_ENABLED:-false}"
      # 统一登录平台(Casdoor)边缘模式(docs/09,默认关=自签 HS256 演示登录)。开启须与前端
      # CONSOLE_AUTH_MODE=oidc 成对;JWKS 由网关容器访问,Casdoor 跑宿主机时用 host.docker.internal。
      RECSYS_EDGE_CASDOOR: "${RECSYS_EDGE_CASDOOR:-false}"
      CASDOOR_JWKS: "${CASDOOR_JWKS:-http://host.docker.internal:8000/.well-known/jwks}"
      CASDOOR_ISSUER: "${CASDOOR_ISSUER:-http://localhost:8000}"
      CASDOOR_AUDIENCES: "${CASDOOR_AUDIENCES:-ragshared0client00000001}"
      CASDOOR_ORG: "${CASDOOR_ORG:-recsys}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${GATEWAY_PORT:-8080}:8080"   # 统一入口(前端 /api 反代到此;本机 8080 被占 → dev-local.env 覆盖 GATEWAY_PORT)

  rec-engine:
    build:
      # 构建上下文=仓库根(Dockerfile 需要全部 pom + 源码);compose 在 docker/ 子目录故 context 指向上级。
      context: ..
      dockerfile: docker/Dockerfile
      args:
        MODULE: recsys-rec-engine
        PORT: 8081
    container_name: recsys-rec-engine
    profiles: ["apps"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nacos:
        condition: service_started
    environment:
      PG_HOST: postgres
      PG_USER: "${PG_USER:-recsys}"
      PG_PASSWORD: "${PG_PASSWORD:-recsys}"
      # ad 读侧 ShardingSphere 次数据源(sharding.yaml 用单占位符传整条 URL);容器内指向 postgres 服务
      PG_JDBC_URL: jdbc:postgresql://postgres:5432/${PG_DB:-recsys}
      PG_DS1_JDBC_URL: jdbc:postgresql://postgres:5432/${PG_DS1_DB:-recsys_ds1}
      REDIS_HOST: redis
      NACOS_ADDR: nacos:8848
      NACOS_DISCOVERY: "true"
      RECSYS_SECURITY_ENABLED: "${RECSYS_SECURITY_ENABLED:-false}"
      SERVER_PORT: 8081
      # 广告在线服务走 gRPC + Nacos 服务发现(discovery:/// 经 DiscoveryClient 解析实例 + round_robin 客户端 LB;
      # 回滚:AD_SERVING_GRPC=static://ad-serving:9095 走容器 DNS 直连,或 AD_SERVING_MODE=in-process 退单体)
      AD_SERVING_MODE: grpc
      AD_SERVING_GRPC: discovery:///recsys-ad-serving
      # 内容服务走 gRPC(展示 hydrate);切 in-process 则退回进程内 ContentService(单体等价)
      CONTENT_SERVING_MODE: grpc
      CONTENT_GRPC: discovery:///recsys-content-service
      # 用户画像服务走 gRPC(冷启动兴趣);切 in-process 则退回进程内 UserProfileService(单体等价)
      USER_SERVING_MODE: grpc
      USER_GRPC: discovery:///recsys-user-service

  ad-serving:
    build:
      # 构建上下文=仓库根(Dockerfile 需要全部 pom + 源码);compose 在 docker/ 子目录故 context 指向上级。
      context: ..
      dockerfile: docker/Dockerfile
      args:
        MODULE: recsys-ad-serving
        PORT: 8085
    container_name: recsys-ad-serving
    profiles: ["apps"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nacos:
        condition: service_started
    environment:
      PG_HOST: postgres
      PG_USER: "${PG_USER:-recsys}"
      PG_PASSWORD: "${PG_PASSWORD:-recsys}"
      # ad 读侧 ShardingSphere 次数据源(同 rec-engine);容器内指向 postgres 服务
      PG_JDBC_URL: jdbc:postgresql://postgres:5432/${PG_DB:-recsys}
      PG_DS1_JDBC_URL: jdbc:postgresql://postgres:5432/${PG_DS1_DB:-recsys_ds1}
      REDIS_HOST: redis
      NACOS_ADDR: nacos:8848
      NACOS_DISCOVERY: "true"
      RECSYS_SECURITY_ENABLED: "${RECSYS_SECURITY_ENABLED:-false}"
      SERVER_PORT: 8085
      # gRPC 端口(net.devh);rec-engine 经容器 DNS ad-serving:9095 连
      GRPC_SERVER_PORT: 9095

  behavior:
    build:
      # 构建上下文=仓库根(Dockerfile 需要全部 pom + 源码);compose 在 docker/ 子目录故 context 指向上级。
      context: ..
      dockerfile: docker/Dockerfile
      args:
        MODULE: recsys-behavior
        PORT: 8082
    container_name: recsys-behavior
    profiles: ["apps"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nacos:
        condition: service_started
    environment:
      PG_HOST: postgres
      REDIS_HOST: redis
      NACOS_ADDR: nacos:8848
      NACOS_DISCOVERY: "true"
      RECSYS_SECURITY_ENABLED: "${RECSYS_SECURITY_ENABLED:-false}"
      SERVER_PORT: 8082

  advertiser:
    build:
      # 构建上下文=仓库根(Dockerfile 需要全部 pom + 源码);compose 在 docker/ 子目录故 context 指向上级。
      context: ..
      dockerfile: docker/Dockerfile
      args:
        MODULE: recsys-advertiser
        PORT: 8083
    container_name: recsys-advertiser
    profiles: ["apps"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nacos:
        condition: service_started
    environment:
      PG_HOST: postgres    # 分库分表 sharding.yaml 的 $${PG_HOST::localhost} 走此环境变量
      PG_USER: "${PG_USER:-recsys}"
      PG_PASSWORD: "${PG_PASSWORD:-recsys}"
      # 写侧 @Primary ShardingSphere 数据源(sharding.yaml 单占位符整条 URL);容器内指向 postgres 服务
      PG_JDBC_URL: jdbc:postgresql://postgres:5432/${PG_DB:-recsys}
      PG_DS1_JDBC_URL: jdbc:postgresql://postgres:5432/${PG_DS1_DB:-recsys_ds1}
      REDIS_HOST: redis
      NACOS_ADDR: nacos:8848
      NACOS_DISCOVERY: "true"
      RECSYS_SECURITY_ENABLED: "${RECSYS_SECURITY_ENABLED:-false}"
      SERVER_PORT: 8083

  console-api:
    build:
      # 构建上下文=仓库根(Dockerfile 需要全部 pom + 源码);compose 在 docker/ 子目录故 context 指向上级。
      context: ..
      dockerfile: docker/Dockerfile
      args:
        MODULE: recsys-console
        PORT: 8090
    container_name: recsys-console-api
    profiles: ["apps"]
    depends_on:
      postgres:
        condition: service_healthy
      nacos:
        condition: service_started
    environment:
      PG_HOST: postgres
      REDIS_HOST: redis
      NACOS_ADDR: nacos:8848
      NACOS_DISCOVERY: "true"
      RECSYS_SECURITY_ENABLED: "${RECSYS_SECURITY_ENABLED:-false}"
      SERVER_PORT: 8090
      # 控制台 BFF 的健康探针 / 上游代理:全部走容器 DNS(全链路容器化)
      RECSYS_CONSOLE_URL: http://console-api:8090
      RECSYS_GATEWAY_URL: http://gateway:8080
      RECSYS_REC_ENGINE_URL: http://rec-engine:8081
      RECSYS_BEHAVIOR_URL: http://behavior:8082
      RECSYS_ADVERTISER_URL: http://advertiser:8083
      RECSYS_AD_SERVING_URL: http://ad-serving:8085
      RECSYS_CONTENT_SERVICE_URL: http://content:8086
      RECSYS_USER_SERVICE_URL: http://user:8087
      PROMETHEUS_URL: "${PROMETHEUS_URL:-http://prometheus:9090}"

  content:
    build:
      # 构建上下文=仓库根(Dockerfile 需要全部 pom + 源码);compose 在 docker/ 子目录故 context 指向上级。
      context: ..
      dockerfile: docker/Dockerfile
      args:
        MODULE: recsys-content-service
        PORT: 8086
    container_name: recsys-content-service
    profiles: ["apps"]
    depends_on:
      postgres:
        condition: service_healthy
      nacos:
        condition: service_started
    environment:
      PG_HOST: postgres
      NACOS_ADDR: nacos:8848
      NACOS_DISCOVERY: "true"
      RECSYS_SECURITY_ENABLED: "${RECSYS_SECURITY_ENABLED:-false}"
      SERVER_PORT: 8086
      GRPC_SERVER_PORT: 9096   # rec-engine 经容器 DNS content:9096 连

  user:
    build:
      # 构建上下文=仓库根(Dockerfile 需要全部 pom + 源码);compose 在 docker/ 子目录故 context 指向上级。
      context: ..
      dockerfile: docker/Dockerfile
      args:
        MODULE: recsys-user-service
        PORT: 8087
    container_name: recsys-user-service
    profiles: ["apps"]
    depends_on:
      postgres:
        condition: service_healthy
      nacos:
        condition: service_started
    environment:
      PG_HOST: postgres
      NACOS_ADDR: nacos:8848
      NACOS_DISCOVERY: "true"
      RECSYS_SECURITY_ENABLED: "${RECSYS_SECURITY_ENABLED:-false}"
      SERVER_PORT: 8087
      GRPC_SERVER_PORT: 9097   # rec-engine 经容器 DNS user:9097 连

volumes:
  pgdata:
  grafana-data:
