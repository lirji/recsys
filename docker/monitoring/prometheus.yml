# Prometheus 抓取配置:抓宿主机上运行的 recsys 服务的 /actuator/prometheus。
# Java 服务在宿主机直接 mvn spring-boot:run,容器内用 host.docker.internal 访问宿主机。
global:
  scrape_interval: 5s
  evaluation_interval: 5s

# 告警规则 + SLO(recsys 在线指标)
rule_files:
  - /etc/prometheus/alert-rules.yml

# 告警路由到 Alertmanager(obs profile 一并起)
alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  # P2:网关(南北向入口,QPS/限流/延迟)
  - job_name: recsys-gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8080"]
        labels:
          application: recsys-gateway

  - job_name: recsys-rec-engine
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8081"]
        labels:
          application: recsys-rec-engine

  - job_name: recsys-behavior
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8082"]
        labels:
          application: recsys-behavior

  # 广告主管理服务(写侧/管理面):抓其 actuator,补广告变现看板对 8083 的覆盖(docs/07 P1)。
  # 注:广告"在线检索/竞价/计费/营收"的核心指标(recsys.ad.*)在 rec-engine(8081)已被抓取;
  #     本 job 补的是 advertiser 写侧服务本身的健康/JVM/HTTP 指标。未启动时该 target down(告警可选)。
  - job_name: recsys-advertiser
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8083"]
        labels:
          application: recsys-advertiser

  # P2:广告在线服务(ad-serving 有 HTTP actuator;计费/竞价/营收核心指标 recsys.ad.* 在 rec-engine 已抓,此处补服务自身健康/JVM)
  - job_name: recsys-ad-serving
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8085"]
        labels:
          application: recsys-ad-serving

  # P2:控制台 BFF
  - job_name: recsys-console
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8090"]
        labels:
          application: recsys-console

  # P2:内部 gRPC 服务(content/user)。已加 spring-boot-starter-web + actuator/prometheus(与 ad-serving 同),
  #      HTTP actuator 可被抓取;gRPC 端口另在 9096/9097,不走 HTTP。
  - job_name: recsys-content-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8086"]
        labels:
          application: recsys-content-service

  - job_name: recsys-user-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8087"]
        labels:
          application: recsys-user-service
