server:
  port: 8087

grpc:
  server:
    port: 9097

spring:
  application:
    name: recsys-user-service
  # P3 微服务化:Nacos 服务发现。默认关(NACOS_DISCOVERY=false)→ 不注册、无 Nacos 也能起。
  cloud:
    nacos:
      discovery:
        enabled: ${NACOS_DISCOVERY:false}
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        namespace: ${NACOS_NAMESPACE:}
        metadata:
          gRPC_port: ${GRPC_SERVER_PORT:9097}
  # app_user:普通 Postgres 主数据源(非分片)。#3 物理拆库:USER_PG_DB 未设→退回 PG_DB→recsys(默认不变);
  # 设 USER_PG_DB=recsys_user 即 user 服务写自有库(DB-per-service),其它服务经 gRPC 读,不直读。
  datasource:
    url: jdbc:postgresql://${PG_HOST:localhost}:${PG_PORT:5432}/${USER_PG_DB:${PG_DB:recsys}}
    username: ${PG_USER:recsys}
    password: ${PG_PASSWORD:recsys}
    driver-class-name: org.postgresql.Driver

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized   # P0:避免向匿名泄漏内部状态
  tracing:
    sampling:
      probability: 1.0
  # P2:OTLP 导出 span 到 Tempo(默认 localhost:4318,OTLP_ENDPOINT 可覆盖)。
  otlp:
    tracing:
      endpoint: ${OTLP_ENDPOINT:http://localhost:4318/v1/traces}

recsys:
  # P0 安全:内部 gRPC 服务放行只读观测端点(与 advertiser 同),供 Prometheus 抓 /actuator/prometheus;
  #   其余端点仍需内部 token。缺此块时默认只放行 /actuator/health → prometheus 被 401、抓不到指标。
  security:
    enabled: ${RECSYS_SECURITY_ENABLED:true}
    internal-secret: ${RECSYS_INTERNAL_SECRET:recsys-dev-internal-secret-change-me}
    permit-paths:
      - /actuator/health/**
      - /actuator/info
      - /actuator/prometheus
