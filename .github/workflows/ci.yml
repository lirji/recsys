name: CI

# 最小 CI(E3):build + 测试门槛 + JaCoCo 契约类覆盖率门槛 + ONNX 单文件校验 + 在线/离线契约跨语言校验。
# 目标:任何改动若破坏"在线/离线一致性"或"陈旧 target/classes / 外部权重"这类部署即崩的隐患,都在合入前拦截。

on:
  push:
    branches: [ main ]
  pull_request:

# 并发:同一分支新推送取消旧运行,省 CI 资源
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # clean verify:强制重编(clean 防陈旧 target/classes 把旧资源打进 jar)+ 跑全部测试
      # + verify 阶段触发 JaCoCo 契约类覆盖率门槛(契约编码器覆盖率跌破 50% 即失败)。
      # ubuntu runner 自带 Docker,E2 的 Testcontainers 集成测试可直接运行。
      - name: Build, test & coverage gate
        run: mvn -B -e clean verify

      # ONNX 必须是单文件自包含,否则在线从 classpath 加载缺权重而崩。
      - name: ONNX self-contained check
        run: bash scripts/check_onnx_selfcontained.sh

      # 在线(Java)/离线(Python)编码契约共读同一 golden 固件,此步校验 Python 侧;
      # Java 侧由上面的 mvn verify(RankEncoderContractGoldenTest)覆盖。
      - name: On/offline contract cross-check (Python)
        run: python3 scripts/verify_contracts.py

      # 覆盖率报告存档,便于人工查看趋势(不阻断)。
      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-reports
          path: '**/target/site/jacoco/**'
          if-no-files-found: ignore

  # P1 钱链路验证闸门:一个独立、可见的 required check。只跑 @Tag("money-chain") 的计费关键测试——
  # GSP 次价 / bill-factor / oCPC 计费数学(BiddingServiceBillFactorTest/VcgAuctionTest/BidTypeTest)
  # + SponsoredAd 经 proto 边界逐字段无损(AdBillingProtoParityTest)。
  # 语义:in-process 与 gRPC 两种 ad-serving 模式必须收一样的钱。此 gate 常绿是 P3 把 AD_SERVING_MODE
  # 翻成 grpc 默认的硬前提——不绿不翻转。
  money-chain-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Money-chain consistency gate
        run: mvn -B -e -pl recsys-ad-common,recsys-proto,recsys-ad -am test -Dgroups=money-chain -DfailIfNoTests=false

  # P3 供应链安全:Trivy 文件系统扫描——后端 Maven / 前端 npm 依赖漏洞(SCA)+ IaC/配置误配。
  # 与 Dependabot(自动升级 PR)互补。教学默认不阻断(报告);生产设 exit-code=1 + severity 收紧即成硬门槛。
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy filesystem scan (deps + misconfig)
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          scan-type: fs
          scanners: vuln,misconfig
          format: table
          exit-code: '0'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'
