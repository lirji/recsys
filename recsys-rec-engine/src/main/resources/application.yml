server:
  port: 8081

spring:
  application:
    name: recsys-rec-engine
  datasource:
    url: jdbc:postgresql://${PG_HOST:localhost}:${PG_PORT:5432}/${PG_DB:recsys}
    username: ${PG_USER:recsys}
    password: ${PG_PASSWORD:recsys}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

# 推荐链路可调参数(生产可迁移到 Nacos 配置中心热更)
recsys:
  recall:
    quota:
      vector: 200
      i2i: 100
      hot: 50
      tag: 50
      u2u: 100
      swing: 100
      semantic: 100
      cold: 100
      two-tower: 200
      generative: 200
      generative-seed: 20
      lexical: 200
      tiger: 200
      cold-per-category: 5
    rrf-k: 60                     # 混合检索 RRF 平滑常数:贡献=1/(k+rank)(搜索场景多路按名次融合)
    # 完整 TIGER 生成式召回:decoder-only Transformer 自回归 beam search 生成下一个 item 的语义 ID
    tiger:
      model-path: classpath:model/tiger.onnx
      schema-path: classpath:model/tiger_schema.json
      beam: 8
    # 双塔召回:user 塔 ONNX(item 向量已离线灌 item_tower_embedding);缺模型则该路返回空、其他路兜底
    two-tower:
      model-path: classpath:model/user_tower.onnx
      schema-path: classpath:model/tower_schema.json
    # 标签召回:把 Flink 写的实时类目偏好(rt:user:{id})叠加进静态画像类目,实时类目按近期计数加权
    tag:
      realtime-enabled: true
      realtime-boost: 1.0
  # Query 理解(docs/04 §11):归一化/分词/意图/向量化/改写 + 可选 LLM 增强
  query:
    llm:
      enabled: true            # LLM query 理解(拼写纠错/意图/改写);仅在 recsys.llm 就绪时实际生效
      max-expansions: 3        # LLM 改写扩展并入 rewrites 的上限
  rank:
    # v1=规则, onnx=LightGBM, deepfm=DeepFM, mmoe=MMoE多目标(ESMM), din=DIN序列建模(失败均回退规则)
    strategy: ${RANK_STRATEGY:v1}
    onnx-model-path: classpath:model/model.onnx
    deepfm-model-path: classpath:model/model_deepfm.onnx
    rank-schema-path: classpath:model/rank_schema.json
    category-vocab-path: classpath:model/category_vocab.json
    # MMoE 多目标(train_mmoe.py 产出)
    mmoe-model-path: classpath:model/model_mmoe.onnx
    mmoe-schema-path: classpath:model/mmoe_schema.json
    mmoe-category-vocab-path: classpath:model/mmoe_category_vocab.json
    # DIN 序列建模(train_din.py 产出)
    din-model-path: classpath:model/model_din.onnx
    din-schema-path: classpath:model/din_schema.json
    din-category-vocab-path: classpath:model/din_category_vocab.json
    # 多目标融合(mmoe/din 共用):finalScore = pCTR·(cvrBias + cvrWeight·pCVR)
    # cvrBias=0、cvrWeight=1 → 退化为 ESMM 的 pCTCVR=pCTR·pCVR
    multi-task:
      cvr-bias: 0.1
      cvr-weight: 1.0
  # 融合:最终分 = (recall-weight*归一化召回分 + rank-weight*排序分) * channel-boost
  fusion:
    recall-weight: 1.0
    rank-weight: 1.0
    # 召回路加权(channel 名大写)。TAG 已叠加实时类目偏好(rt:user),抬权让"用户当下/长期兴趣"
    # 不被 HOT/CF 高热度在全局归一化中压过;多路命中取最大 boost。设 1.0 即关闭该路加权。
    channel-boost:
      TAG: 1.5
  # 搜索(query 驱动)场景专用融合,覆盖上面的 fusion.*:让 query↔item 相关性主导而非个性化热度。
  search:
    bypass-cold-start: true   # 冷用户带 query 时不走冷启动覆盖(query 已是明确意图)
    recall-weight: 2.0        # 召回分(=query 相关性)主导
    rank-weight: 0.5          # 个性化/CTR 排序分降权为次序信号
    channel-boost:            # 抬升 query 驱动的路:语义 + 词法 + 意图 TAG
      SEMANTIC: 2.0
      LEXICAL: 2.0
      TAG: 1.8
    personalization-weight: 0.5  # 温和个性化:×(1+权重·cos(user_emb,item_emb));0=纯相关性
  rerank:
    max-same-category: 3
  filter:
    # 已看过滤:从召回结果剔除用户已正反馈(CLICK/LIKE/PLAY/RATING)过的物品
    seen-enabled: true
  cache:
    rec-ttl-seconds: 300
  embedding:
    dimension: 768
    provider: ${EMBEDDING_PROVIDER:gemini}     # gemini(默认)/ local(本地 BGE ONNX)
    gemini:
      api-key: ${GEMINI_API_KEY:}
    # 本地 BGE 兜底(provider=local):模型由 recsys-embedding/train/export_bge_onnx.py 导出
    local:
      model-path: ${BGE_MODEL_PATH:${user.home}/.recsys/models/bge-base-en-v1.5/model.onnx}
      vocab-path: ${BGE_VOCAB_PATH:${user.home}/.recsys/models/bge-base-en-v1.5/vocab.txt}
      max-seq-len: 256
      pooling: cls
  # 生成式 LLM(docs/04 §11):Gemini generateContent。默认关闭 + 空 key ⇒ 未就绪,query 理解走纯词法兜底
  llm:
    enabled: ${LLM_ENABLED:false}
    provider: gemini
    api-key: ${GEMINI_API_KEY:}
    model: ${LLM_MODEL:gemini-2.0-flash}
    temperature: 0.1
    max-output-tokens: 512
    cache-ttl-seconds: 86400
  # 搜索广告(docs/05):query→ad 召回 + relevance-gate + eCPM 竞价 + GSP 计费 + 预算 pacing + pCTR 校准
  ad:
    slots: 3                       # 广告位数
    calib-model: ${AD_CALIB_MODEL:deepfm}   # pCTR 校准表标识(对应 ad-calibrate 作业 ad:calib:{model})
    recall:
      kw: 200
      semantic: 100
      hot: 50
      relevance-threshold: 0.05    # 相关性门槛,低于则丢弃(广告独有硬过滤)
      kw-weight: 0.6               # 相关性 = kw-weight·关键词匹配 + sem-weight·query↔ad 余弦
      sem-weight: 0.4
    auction:
      reserve-price: 0.1           # 保留价(元):eCPM 低于此值不展示;GSP 扣费下限
      price-increment: 0.01        # GSP 次价加价(元)
      # List-wise 外部性(M7):整页贪心选择,按与已选广告相似度衰减有效质量,治相邻同类广告 CTR 蚕食
      listwise:
        enabled: ${AD_LISTWISE_ENABLED:false}   # 默认关(改变竞得集合+计费,需显式启用)
        externality-weight: 0.5    # λ∈[0,1]:衰减=1−λ·maxSim,越大越惩罚冗余/越偏多样
        min-retention: 0.3         # 衰减下限:再冗余也保留这一比例有效质量(权重上限 1/此值)
    # oCPC 智能出价(M6):广告主只给 target_cpa,平台 bid=targetCpa·pCVR·k 自动出价(k 由 ad-ocpc 离线拟合)
    ocpc:
      enabled: ${AD_OCPC_ENABLED:true}
      default-pcvr: 0.1            # 排序模型(mmoe/din)未给 pCVR 时的兜底先验转化率
      max-bid: 0.0                 # 自动出价上限(元);<=0 不封顶
    # 混排 Ad Load(docs/05 §4.8):/api/feed 把广告按位次/密度混入自然结果
    ad-load:
      enabled: ${AD_LOAD_ENABLED:true}
      slots: [2, 6, 10]            # 广告插入的信息流位次(1 基)
      max-ads: 3                   # 单次信息流最多广告数
    # 频控:同用户当日同广告/同广告主曝光上限(防骚扰;Redis 不可用则不限频)
    freq:
      enabled: ${AD_FREQ_ENABLED:true}
      per-ad: 3
      per-advertiser: 8
    # 新广告 EE 探索:UCB 加成抬升曝光不足广告的排序 eCPM(只进排序、不进计费);统计由 ad-explore-stats 物化
    exploration:
      enabled: ${AD_EXPLORE_ENABLED:true}
      coef: 0.5                    # UCB 系数,越大探索越激进
      max-boost: 3.0               # 探索加成上限
    # 反作弊:无效点击过滤(去重 + 频次),守计费公平;无效点击落 INVALID_CLICK 不计费
    anti-fraud:
      enabled: ${AD_ANTIFRAUD_ENABLED:true}
      max-clicks-per-minute: 20    # 同用户每分钟有效点击上限,超出判机器流量
    pacing:
      enabled: ${AD_PACING_ENABLED:true}   # 实时预算熔断 + 平滑;关闭=不限预算(本地无 Redis 调试)
  cold-start:
    # 行为数 < 阈值且无用户向量 → 冷启动(走类目探索 + 强多样性重排)
    min-behaviors: 5
    rerank-max-same-category: 1
  # 分层 A/B:recall/rank/rerank 各自独立分桶,可正交组合。enabled=false 时每层取第一个 variant(基线)
  experiment:
    enabled: ${EXPERIMENT_ENABLED:true}
    layers:
      recall:
        salt: recall-2026a
        variants:
          - name: base
            weight: 50
            params:
              channels: "VECTOR,I2I,HOT,TAG"
          - name: plus
            weight: 50
            params:
              channels: "VECTOR,I2I,HOT,TAG,U2U,SWING,SEMANTIC,TWO_TOWER,GENERATIVE,TIGER"
      rank:
        salt: rank-2026a
        variants:
          - name: v1
            weight: 50
            params:
              strategy: v1
          - name: onnx
            weight: 50
            params:
              strategy: onnx
      rerank:
        salt: rerank-2026a
        variants:
          - name: diversity
            weight: 50
            params:
              strategy: diversity
              maxSameCategory: "3"
          - name: mmr
            weight: 50
            params:
              strategy: mmr
              lambda: "0.7"
      # 广告分层 A/B(docs/05):由广告链路单独消费(不进推荐 bucketTag);变体覆盖 reserve-price 等,
      # ad_event.ad_bucket 落库,ad-report 按桶对比 CTR/收入/eCPM。
      ad:
        salt: ad-2026a
        variants:
          - name: base
            weight: 50
            params:
              reserve-price: "0.05"
          - name: high-reserve
            weight: 50
            params:
              reserve-price: "0.15"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
