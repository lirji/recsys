server:
  port: 8081

spring:
  application:
    name: recsys-rec-engine
  datasource:
    url: jdbc:postgresql://${PG_HOST:localhost}:${PG_PORT:5432}/${PG_DB:recsys}
    username: ${PG_USER:recsys}
    password: ${PG_PASSWORD:recsys}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

# 推荐链路可调参数(生产可迁移到 Nacos 配置中心热更)
recsys:
  recall:
    quota:
      vector: 200
      i2i: 100
      hot: 50
      tag: 50
      u2u: 100
      swing: 100
      semantic: 100
      cold: 100
      two-tower: 200
      cold-per-category: 5
    # 双塔召回:user 塔 ONNX(item 向量已离线灌 item_tower_embedding);缺模型则该路返回空、其他路兜底
    two-tower:
      model-path: classpath:model/user_tower.onnx
      schema-path: classpath:model/tower_schema.json
    # 标签召回:把 Flink 写的实时类目偏好(rt:user:{id})叠加进静态画像类目,实时类目按近期计数加权
    tag:
      realtime-enabled: true
      realtime-boost: 1.0
  rank:
    # v1=规则, onnx=LightGBM, deepfm=DeepFM, mmoe=MMoE多目标(ESMM), din=DIN序列建模(失败均回退规则)
    strategy: ${RANK_STRATEGY:v1}
    onnx-model-path: classpath:model/model.onnx
    deepfm-model-path: classpath:model/model_deepfm.onnx
    rank-schema-path: classpath:model/rank_schema.json
    category-vocab-path: classpath:model/category_vocab.json
    # MMoE 多目标(train_mmoe.py 产出)
    mmoe-model-path: classpath:model/model_mmoe.onnx
    mmoe-schema-path: classpath:model/mmoe_schema.json
    mmoe-category-vocab-path: classpath:model/mmoe_category_vocab.json
    # DIN 序列建模(train_din.py 产出)
    din-model-path: classpath:model/model_din.onnx
    din-schema-path: classpath:model/din_schema.json
    din-category-vocab-path: classpath:model/din_category_vocab.json
    # 多目标融合(mmoe/din 共用):finalScore = pCTR·(cvrBias + cvrWeight·pCVR)
    # cvrBias=0、cvrWeight=1 → 退化为 ESMM 的 pCTCVR=pCTR·pCVR
    multi-task:
      cvr-bias: 0.1
      cvr-weight: 1.0
  # 融合:最终分 = (recall-weight*归一化召回分 + rank-weight*排序分) * channel-boost
  fusion:
    recall-weight: 1.0
    rank-weight: 1.0
    # 召回路加权(channel 名大写)。TAG 已叠加实时类目偏好(rt:user),抬权让"用户当下/长期兴趣"
    # 不被 HOT/CF 高热度在全局归一化中压过;多路命中取最大 boost。设 1.0 即关闭该路加权。
    channel-boost:
      TAG: 1.5
  rerank:
    max-same-category: 3
  filter:
    # 已看过滤:从召回结果剔除用户已正反馈(CLICK/LIKE/PLAY/RATING)过的物品
    seen-enabled: true
  cache:
    rec-ttl-seconds: 300
  embedding:
    dimension: 768
    provider: ${EMBEDDING_PROVIDER:gemini}     # gemini(默认)/ local(本地 BGE ONNX)
    gemini:
      api-key: ${GEMINI_API_KEY:}
    # 本地 BGE 兜底(provider=local):模型由 recsys-embedding/train/export_bge_onnx.py 导出
    local:
      model-path: ${BGE_MODEL_PATH:${user.home}/.recsys/models/bge-base-en-v1.5/model.onnx}
      vocab-path: ${BGE_VOCAB_PATH:${user.home}/.recsys/models/bge-base-en-v1.5/vocab.txt}
      max-seq-len: 256
      pooling: cls
  # 搜索广告(docs/05):query→ad 召回 + relevance-gate + eCPM 竞价 + GSP 计费 + 预算 pacing + pCTR 校准
  ad:
    slots: 3                       # 广告位数
    calib-model: ${AD_CALIB_MODEL:deepfm}   # pCTR 校准表标识(对应 ad-calibrate 作业 ad:calib:{model})
    recall:
      kw: 200
      semantic: 100
      hot: 50
      relevance-threshold: 0.05    # 相关性门槛,低于则丢弃(广告独有硬过滤)
      kw-weight: 0.6               # 相关性 = kw-weight·关键词匹配 + sem-weight·query↔ad 余弦
      sem-weight: 0.4
    auction:
      reserve-price: 0.1           # 保留价(元):eCPM 低于此值不展示;GSP 扣费下限
      price-increment: 0.01        # GSP 次价加价(元)
    pacing:
      enabled: ${AD_PACING_ENABLED:true}   # 实时预算熔断 + 平滑;关闭=不限预算(本地无 Redis 调试)
  cold-start:
    # 行为数 < 阈值且无用户向量 → 冷启动(走类目探索 + 强多样性重排)
    min-behaviors: 5
    rerank-max-same-category: 1
  # 分层 A/B:recall/rank/rerank 各自独立分桶,可正交组合。enabled=false 时每层取第一个 variant(基线)
  experiment:
    enabled: ${EXPERIMENT_ENABLED:true}
    layers:
      recall:
        salt: recall-2026a
        variants:
          - name: base
            weight: 50
            params:
              channels: "VECTOR,I2I,HOT,TAG"
          - name: plus
            weight: 50
            params:
              channels: "VECTOR,I2I,HOT,TAG,U2U,SWING,SEMANTIC,TWO_TOWER"
      rank:
        salt: rank-2026a
        variants:
          - name: v1
            weight: 50
            params:
              strategy: v1
          - name: onnx
            weight: 50
            params:
              strategy: onnx
      rerank:
        salt: rerank-2026a
        variants:
          - name: diversity
            weight: 50
            params:
              strategy: diversity
              maxSameCategory: "3"
          - name: mmr
            weight: 50
            params:
              strategy: mmr
              lambda: "0.7"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
