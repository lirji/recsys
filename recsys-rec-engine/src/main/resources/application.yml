server:
  port: 8081

spring:
  application:
    name: recsys-rec-engine
  # P4 配置中心:从 Nacos 拉取热更配置(dataId=recsys-rec-engine.yml,group=DEFAULT_GROUP)。
  # optional: → Nacos 不可达时跳过、退回本地 yml 默认(优雅降级硬约束,无 Nacos 也能起);去掉 optional: 则 Nacos 必达。
  # Nacos 里改 recsys.ad.*(reserve/pacing/频控/ad-load)或 recsys.fusion.*,refresh-enabled 会自动重绑 @ConfigurationProperties,
  # 在线 30s 内生效不重启(消费方读的是活的 AdProperties getter,故无需给每个 bean 加 @RefreshScope)。
  config:
    import: "optional:nacos:recsys-rec-engine.yml"
  cloud:
    nacos:
      config:
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
        file-extension: yaml            # dataId 后缀 + 解析格式(与本文件同为 yaml)
        namespace: ${NACOS_NAMESPACE:}   # 空=public;多环境隔离时按环境切
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        refresh-enabled: true            # Nacos 推送变更即自动 refresh(否则仅启动时拉一次)
      # P0 微服务化:Nacos 服务发现(注册自身,供网关 lb://recsys-rec-engine 解析)。
      # 默认开(NACOS_DISCOVERY=true)→ 注册到 Nacos,供 gRPC discovery:/// 与网关 lb:// 解析;
      # 无 Nacos 的纯本地跑显式设 NACOS_DISCOVERY=false 退回(dev-local.sh 即如此)。
      discovery:
        enabled: ${NACOS_DISCOVERY:true}
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        namespace: ${NACOS_NAMESPACE:}
  datasource:
    # socketTimeout/connectTimeout(秒):底层 socket 读/连不再无限阻塞——PG 挂起时读超时即抛 SQLException,
    # 连接被弃用、调用线程被真正回收(cancel(true) 对阻塞 socket 读无效的补足,配合召回舱壁根治"慢路占死线程")。
    url: "jdbc:postgresql://${PG_HOST:localhost}:${PG_PORT:5432}/${PG_DB:recsys}?socketTimeout=${PG_SOCKET_TIMEOUT:30}&connectTimeout=${PG_CONNECT_TIMEOUT:5}"
    username: ${PG_USER:recsys}
    password: ${PG_PASSWORD:recsys}
    driver-class-name: org.postgresql.Driver
    hikari:
      # 每条物理连接建立后执行一次:(1) 把 HNSW 运行期检索宽度设到 ≥ 最大召回 LIMIT(vector/two-tower 均 200)。
      # 否则默认 ef_search=40,LIMIT 200 的向量召回只保证约 40 个真近邻、其余为低质量填充(召回被静默腰斩)。
      # (2) 服务端 statement_timeout(毫秒):主库承载 content/rank/lexical 等较重读,取<b>宽松</b> 10s 上限
      # (仅防失控慢查询,不误杀正常查询;向量 ANN 快查库另在 AdShardingConfig 取更紧的 2s)。
      connection-init-sql: SET hnsw.ef_search = 200; SET statement_timeout = ${PG_PRIMARY_STATEMENT_TIMEOUT_MS:10000}
      # 显式池配置:默认 max=10 在多路召回(单次请求并发多条独立 JDBC + 3~4 次 ANN)下易连接饥饿。
      # 单请求连接扇出已降:近期正反馈物品编排层每请求取一次下发 I2I/SWING/GENERATIVE(原 3 次→1 次)、
      # 向量读去掉必然失败的 getObject 二次查询;故 max=20 在中等并发下够用。要进一步扩容按实测再调:
      # 压测观察 Hikari `hikari.connections.pending`/`.timeout` 指标 → 非零且持续则上调 DB_POOL_MAX
      # (同时确认 Postgres max_connections 覆盖所有服务的池之和,默认 100),并按需上调 DERIVED_DB_POOL_MAX。
      maximum-pool-size: ${DB_POOL_MAX:20}
      # min-idle=10:突发流量下备足热连接,避免边界处现建连接的毫秒级尖刺(稳态多占几条空闲连接,PG 开销可忽略)。
      minimum-idle: ${DB_POOL_MIN:10}
      connection-timeout: ${DB_POOL_CONN_TIMEOUT_MS:3000}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      # P1 弹性:Redis 命令/连接超时,抖动时快速失败退降级(vector/recall/bandit 等多路读 Redis)
      timeout: ${REDIS_TIMEOUT:2000ms}
      connect-timeout: ${REDIS_CONNECT_TIMEOUT:2000ms}
  # P4:消费 behavior-events 建"已看"读模型。监听器默认不启动(recsys.behavior.seen-consume)→ 无 Kafka 也能起。
  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}
    consumer:
      group-id: recsys-rec-engine-seen
      auto-offset-reset: latest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

# gRPC 客户端(net.devh):仅 recsys.<svc>.serving.mode=grpc 时对应 gateway 注入 @GrpcClient 才建通道。
# 地址默认静态(static://localhost,无需 Nacos,契合优雅降级 + 本地单实例);容器/生产经 env 切
# discovery:///recsys-<svc>-service(见 docker-compose apps profile / k8s),由 Spring Cloud DiscoveryClient
# 从 Nacos 解析实例(服务端已发布 metadata.gRPC_port 供 net.devh 取 gRPC 端口)。
# default-load-balancing-policy=round_robin:多实例注册后按 subchannel 轮询做客户端负载均衡;
# 单实例(static:// 或仅一副本)时退化为直连、无副作用。deadline/熔断/重试见下方 resilience4j。
grpc:
  client:
    ad-serving:
      address: ${AD_SERVING_GRPC:static://localhost:9095}
      negotiation-type: plaintext
      default-load-balancing-policy: round_robin
    # P2 内容服务:仅 recsys.content.serving.mode=grpc 时 GrpcContentGateway 建通道。
    content:
      address: ${CONTENT_GRPC:static://localhost:9096}
      negotiation-type: plaintext
      default-load-balancing-policy: round_robin
    # P3 用户画像服务:仅 recsys.user.serving.mode=grpc 时 GrpcUserGateway 建通道。
    user:
      address: ${USER_GRPC:static://localhost:9097}
      negotiation-type: plaintext
      default-load-balancing-policy: round_robin

# 推荐链路可调参数。P4 已接 Nacos:把本 recsys.* 树(尤其 recsys.ad.* / recsys.fusion.*)放到 Nacos
# dataId=recsys-rec-engine.yml 即可热更——线上改 reserve-price/pacing/频控/ad-load 不重启(见上 spring.cloud.nacos)。
# 本文件的值是 Nacos 不可达时的本地默认。
recsys:
  # P0 安全:边缘认证由网关负责,本服务做纵深防御(校验网关签发的内部令牌)。
  # permit-paths 放行公开只读接口 + 健康探针;其余(/api/user、/api/ad、/api/experiment)需身份。
  # 关闭安全:RECSYS_SECURITY_ENABLED=false(nosec,本地讲解用)。密钥生产从密钥分层注入,勿用默认。
  security:
    enabled: ${RECSYS_SECURITY_ENABLED:true}
    internal-secret: ${RECSYS_INTERNAL_SECRET:recsys-dev-internal-secret-change-me}
    permit-paths:
      - /actuator/health/**
      - /actuator/info
      - /actuator/prometheus
      - /api/recommend/**
      - /api/search/**
      - /api/feed/**
      - /api/query/**
  # P1 弹性:gRPC 客户端每调用 deadline(ms),防跨进程(ad-serving/content/user)无限挂起;与安全正交。
  grpc:
    deadline-ms: ${GRPC_DEADLINE_MS:800}
  # P2 内容服务网关模式:in-process=进程内直调 ContentService(默认=单体回退,零网络跳);
  # grpc=展示 hydrate 走 recsys-content-service。切换只改本项(或 CONTENT_SERVING_MODE),RecommendOrchestrator/前端零改动。
  content:
    serving:
      mode: ${CONTENT_SERVING_MODE:in-process}
    # #3 content 拆库:逐候选热路径 item 读源(与 serving.mode 正交)。
    #   db(默认,直读共享 item,回滚落点)| replica(读本地副本 item_local,离线 sync-item-catalog 灌;item 物理拆库后用)。
    #   同管 ItemCatalogReader(LEXICAL/TAG/冷启动/SIM/query)与 ContentService.findByIds(rank×10/ad CVR)。
    item-source: ${CONTENT_ITEM_SOURCE:db}
  # P3 用户画像服务网关模式:in-process=进程内直调 UserProfileService(默认=单体回退);grpc=调 recsys-user-service。
  user:
    serving:
      mode: ${USER_SERVING_MODE:in-process}
  # P4 已看来源:db(默认,直读 user_behavior,回滚落点)| replica(读 seen:{user} 事件读模型,DB-per-service)。
  # 延迟提示:db 模式是每请求 `SELECT DISTINCT item_id ... WHERE user_id=?` 全历史扫(重度用户历史越长越慢、
  # 且并行召回时各占一条连接)。生产建议切 replica(SEEN_SOURCE=replica) → 一次 Redis SMEMBERS 取已看集,
  # 常数级、不占 JDBC 连接;切前需先 SEEN_CONSUME=true 让 behavior-events 监听器灌好 seen:{user} 读模型。
  behavior:
    seen-source: ${SEEN_SOURCE:db}
    seen-consume: ${SEEN_CONSUME:false}   # 是否启动 behavior-events 监听器建 seen 读模型(replica 模式需先开它灌读模型)
    topic: behavior-events
  recall:
    quota:
      vector: 200
      i2i: 100
      hot: 50
      tag: 50
      u2u: 100
      swing: 100
      semantic: 100
      cold: 100
      two-tower: 200
      generative: 200
      generative-seed: 20
      lexical: 200
      tiger: 200
      cold-per-category: 5
    rrf-k: 60                     # 混合检索 RRF 平滑常数:贡献=1/(k+rank)(搜索场景多路按名次融合)
    # 完整 TIGER 生成式召回:decoder-only Transformer 自回归 beam search 生成下一个 item 的语义 ID
    tiger:
      model-path: classpath:model/tiger.onnx
      schema-path: classpath:model/tiger_schema.json
      beam: 8
    # 双塔召回:user 塔 ONNX(item 向量已离线灌 item_tower_embedding);缺模型则该路返回空、其他路兜底
    two-tower:
      model-path: classpath:model/user_tower.onnx
      schema-path: classpath:model/tower_schema.json
    # 标签召回:把 Flink 写的实时类目偏好(rt:user:{id})叠加进静态画像类目,实时类目按近期计数加权
    tag:
      realtime-enabled: true
      realtime-boost: 1.0
  # Query 理解(docs/04 §11):归一化/分词/意图/向量化/改写 + 可选 LLM 增强
  query:
    llm:
      enabled: true            # LLM query 理解(拼写纠错/意图/改写);仅在 recsys.llm 就绪时实际生效
      max-expansions: 3        # LLM 改写扩展并入 rewrites 的上限
  rank:
    # v1=规则, onnx=LightGBM, deepfm=DeepFM, dcn=DCN v2 显式交叉, mmoe=MMoE多目标(ESMM), din=DIN序列, dien=DIEN兴趣演化, sim=SIM长序列, ple=PLE多目标(失败均回退规则)
    strategy: ${RANK_STRATEGY:v1}
    onnx-model-path: classpath:model/model.onnx
    deepfm-model-path: classpath:model/model_deepfm.onnx
    rank-schema-path: classpath:model/rank_schema.json
    category-vocab-path: classpath:model/category_vocab.json
    # DCN v2 显式高阶交叉(train_dcn.py 产出;与 DeepFM 同在线契约:dense[N,5]+sparse[N,3]→ctr[N,1])
    dcn-model-path: classpath:model/model_dcn.onnx
    dcn-schema-path: classpath:model/dcn_schema.json
    dcn-category-vocab-path: classpath:model/dcn_category_vocab.json
    # MMoE 多目标(train_mmoe.py 产出)
    mmoe-model-path: classpath:model/model_mmoe.onnx
    mmoe-schema-path: classpath:model/mmoe_schema.json
    mmoe-category-vocab-path: classpath:model/mmoe_category_vocab.json
    # DIN 序列建模(train_din.py 产出)
    din-model-path: classpath:model/model_din.onnx
    din-schema-path: classpath:model/din_schema.json
    din-category-vocab-path: classpath:model/din_category_vocab.json
    # PLE 多目标(train_ple.py 产出;与 MMoE 同在线契约,共享专家+每任务专属专家治负迁移)
    ple-model-path: classpath:model/model_ple.onnx
    ple-schema-path: classpath:model/ple_schema.json
    ple-category-vocab-path: classpath:model/ple_category_vocab.json
    # DIEN 兴趣演化(train_dien.py 产出;GRU 兴趣抽取 + AUGRU 演化;在线 4 输入/2 输出契约同 DIN)
    dien-model-path: classpath:model/model_dien.onnx
    dien-schema-path: classpath:model/dien_schema.json
    dien-category-vocab-path: classpath:model/dien_category_vocab.json
    # SIM 长序列(train_sim.py 产出;GSU 类目硬检索长历史 + ESU=DIN 注意力;契约同 DIN)
    sim-model-path: classpath:model/model_sim.onnx
    sim-schema-path: classpath:model/sim_schema.json
    sim-category-vocab-path: classpath:model/sim_category_vocab.json
    sim-long-history: 500          # GSU 检索基:每请求拉用户近 N 条正反馈供类目检索
    # 多目标融合(mmoe/din 共用):finalScore = pCTR·(cvrBias + cvrWeight·pCVR)
    # cvrBias=0、cvrWeight=1 → 退化为 ESMM 的 pCTCVR=pCTR·pCVR
    multi-task:
      cvr-bias: 0.1
      cvr-weight: 1.0
    # 粗排(pre-rank):候选 > limit 时用轻量打分(召回分+热度+类目亲和)砍到 top-limit 再进精排,
    # 补齐 召回→粗排→精排 漏斗;候选 ≤ limit 直接放行。enabled=false 关闭(候选全量进精排=旧行为)。
    pre-rank:
      enabled: true
      limit: 50
      recall-weight: 1.0
      pop-weight: 0.3
      affinity-weight: 0.5
  # 融合:最终分 = (recall-weight*归一化召回分 + rank-weight*排序分) * channel-boost
  fusion:
    recall-weight: 1.0
    rank-weight: 1.0
    # 流行度去偏:融合分乘 1/(1+item_pop_norm)^beta,系统性压低 HOT/CF 高热度、相对抬升语义/长尾,
    # 从机制上替代 channel-boost 到处打补丁。beta 越大越压热度(0.5~1 常用);enabled=false 或 beta=0 关闭。
    pop-debias:
      enabled: true
      beta: 0.5
    # 精排分数校准:rank 原始分经保序回归映射成可比概率再进融合(离线 rec-calibrate 拟合 rec:calib:{model})。
    # isotonic 单调不改单策略内排序,但让 recall+rank 融合量纲一致、可解释。表缺失则原样返回(默认开也不改行为)。
    calibration:
      enabled: true
      model: rec
    # 近线增量学习 FTRL-LR 信号:融合分加 weight·pFtrl(user,item)(离线 train-ftrl 近线刷新 ftrl:weights)。
    # 补 T+1 批模型的时效短板;模型缺失打分为 0(默认开也不改行为)。weight=0 或 enabled=false 关闭。
    ftrl:
      enabled: true
      weight: 0.5
    # R7 全量 contextual bandit(LinUCB/Thompson)探索:融合分加 weight·探索加成,用排序特征空间不确定性
    # 驱动欠曝上下文的探索(离线 bandit-stats 攒 A/b → BANDIT_MODEL;缺模型打分 0)。默认关(改排序,需显式开)。
    bandit:
      enabled: ${FUSION_BANDIT_ENABLED:false}
      weight: 0.3                # 融合混合系数(与排序分同尺;调小=以探索为主,不与排序打架)
      alpha: 1.0                 # LinUCB 置信宽度 / Thompson 采样标准差倍数(热更)
      mode: linucb               # linucb | thompson(mode 走静态 yml,切换重启)
    # 召回路加权(channel 名大写)。TAG 已叠加实时类目偏好(rt:user),抬权让"用户当下/长期兴趣"
    # 不被 HOT/CF 高热度在全局归一化中压过;多路命中取最大 boost。设 1.0 即关闭该路加权。
    channel-boost:
      TAG: 1.5
  # 搜索(query 驱动)场景专用融合,覆盖上面的 fusion.*:让 query↔item 相关性主导而非个性化热度。
  search:
    bypass-cold-start: true   # 冷用户带 query 时不走冷启动覆盖(query 已是明确意图)
    recall-weight: 2.0        # 召回分(=query 相关性)主导
    rank-weight: 0.5          # 个性化/CTR 排序分降权为次序信号
    channel-boost:            # 抬升 query 驱动的路:语义 + 词法 + 意图 TAG
      SEMANTIC: 2.0
      LEXICAL: 2.0
      TAG: 1.8
    personalization-weight: 0.5  # 温和个性化:×(1+权重·cos(user_emb,item_emb));0=纯相关性
  rerank:
    max-same-category: 3
  filter:
    # 已看过滤:从召回结果剔除用户已正反馈(CLICK/LIKE/PLAY/RATING)过的物品
    seen-enabled: true
  cache:
    rec-ttl-seconds: 300
  embedding:
    dimension: 768
    provider: ${EMBEDDING_PROVIDER:gemini}     # gemini(默认)/ local(本地 BGE ONNX)
    gemini:
      api-key: ${GEMINI_API_KEY:}
    # 本地 BGE 兜底(provider=local):模型由 recsys-embedding/train/export_bge_onnx.py 导出
    local:
      model-path: ${BGE_MODEL_PATH:${user.home}/.recsys/models/bge-base-en-v1.5/model.onnx}
      vocab-path: ${BGE_VOCAB_PATH:${user.home}/.recsys/models/bge-base-en-v1.5/vocab.txt}
      max-seq-len: 256
      pooling: cls
  # 生成式 LLM(docs/04 §11):Gemini generateContent。默认关闭 + 空 key ⇒ 未就绪,query 理解走纯词法兜底
  llm:
    enabled: ${LLM_ENABLED:false}
    provider: gemini
    api-key: ${GEMINI_API_KEY:}
    model: ${LLM_MODEL:gemini-2.0-flash}
    temperature: 0.1
    max-output-tokens: 512
    cache-ttl-seconds: 86400
  # 搜索广告(docs/05):query→ad 召回 + relevance-gate + eCPM 竞价 + GSP 计费 + 预算 pacing + pCTR 校准
  ad:
    # 广告在线服务网关模式(微服务化第一刀,docs 计划 F):in-process=进程内直调 AdPipeline(默认=单体回退,
    # 零网络跳、行为等同拆分前);grpc=跨进程调 recsys-ad-serving。切换只改本项(或 AD_SERVING_MODE),
    # gateway / SearchAdsController / FeedOrchestrator 一概零改动 —— 这是绞杀者迁移的一键切换与回滚点。
    serving:
      mode: ${AD_SERVING_MODE:in-process}
    slots: 3                       # 广告位数
    calib-model: ${AD_CALIB_MODEL:deepfm}   # pCTR 校准表标识(对应 ad-calibrate 作业 ad:calib:{model})
    recall:
      kw: 200
      semantic: 100
      u2a: 80                      # U2A 定向配额:用户长期向量 → ad_embedding ANN(query 无关的个性化补充)
      hot: 50
      relevance-threshold: 0.05    # 相关性门槛,低于则丢弃(广告独有硬过滤)
      kw-weight: 0.6               # 相关性 = kw-weight·关键词匹配 + sem-weight·query↔ad 余弦
      sem-weight: 0.4
    auction:
      reserve-price: 0.1           # 保留价(元):eCPM 低于此值不展示;GSP 扣费下限
      price-increment: 0.01        # GSP 次价加价(元)
      # List-wise 外部性(M7):整页贪心选择,按与已选广告相似度衰减有效质量,治相邻同类广告 CTR 蚕食
      listwise:
        enabled: ${AD_LISTWISE_ENABLED:false}   # 默认关(改变竞得集合+计费,需显式启用)
        externality-weight: 0.5    # λ∈[0,1]:衰减=1−λ·maxSim,越大越惩罚冗余/越偏多样
        min-retention: 0.3         # 衰减下限:再冗余也保留这一比例有效质量(权重上限 1/此值)
    # oCPC 智能出价(M6):广告主只给 target_cpa,平台 bid=targetCpa·pCVR·k 自动出价(k 由 ad-ocpc 离线拟合)
    ocpc:
      enabled: ${AD_OCPC_ENABLED:true}
      default-pcvr: 0.1            # 排序模型(mmoe/din)未给 pCVR 时的兜底先验转化率
      max-bid: 0.0                 # 自动出价上限(元);<=0 不封顶
    # A6 延迟反馈 DFM ad-CVR:开启且 model_dfm_cvr.onnx 就绪时,用带删失联合训练的**去偏** pCVR 覆盖复用 MMoE 头
    # (根治延迟转化删失偏置);缺模型/未就绪退回 MMoE 头。默认关(改 pCVR 来源,需显式开)。train_dfm.py 产出。
    cvr:
      enabled: ${AD_CVR_DFM_ENABLED:false}
      model-path: classpath:model/model_dfm_cvr.onnx
      schema-path: classpath:model/dfm_cvr_schema.json
      vocab-path: classpath:model/dfm_cvr_category_vocab.json
    # 混排 Ad Load(docs/05 §4.8):/api/feed 把广告按位次/密度混入自然结果
    ad-load:
      enabled: ${AD_LOAD_ENABLED:true}
      slots: [2, 6, 10]            # 广告插入的信息流位次(1 基)
      max-ads: 3                   # 单次信息流最多广告数
    # 频控:同用户当日同广告/同广告主曝光上限(防骚扰;Redis 不可用则不限频)
    freq:
      enabled: ${AD_FREQ_ENABLED:true}
      per-ad: 3
      per-advertiser: 8
    # 新广告 EE 探索:UCB 加成抬升曝光不足广告的排序 eCPM(只进排序、不进计费);统计由 ad-explore-stats 物化
    exploration:
      enabled: ${AD_EXPLORE_ENABLED:true}
      coef: 0.5                    # UCB 系数,越大探索越激进
      max-boost: 3.0               # 探索加成上限
    # 反作弊:无效点击过滤(去重 + 频次),守计费公平;无效点击落 INVALID_CLICK 不计费
    anti-fraud:
      enabled: ${AD_ANTIFRAUD_ENABLED:true}
      max-clicks-per-minute: 20    # 同用户每分钟有效点击上限,超出判机器流量
    pacing:
      enabled: ${AD_PACING_ENABLED:true}   # 实时预算熔断 + 平滑;关闭=不限预算(本地无 Redis 调试)
    # 精细化质量度(M7):用离线 ad-quality 算的数据驱动质量度(ad:quality:{adId})替换随机基线;缺失退基线
    quality:
      enabled: ${AD_QUALITY_ENABLED:true}
    # 动态创意优化 DCO(M7):一个广告多套创意,多臂老虎机(UCB)按创意级 CTR 择优展示;关闭=默认创意
    dco:
      enabled: ${AD_DCO_ENABLED:false}
      ucb-coef: 0.5                # UCB 探索系数,越大越激进探索新/低曝创意
  cold-start:
    # 行为数 < 阈值且无用户向量 → 冷启动(走类目探索 + 强多样性重排)
    min-behaviors: 5
    rerank-max-same-category: 1
  # 分层 A/B:recall/rank/rerank 各自独立分桶,可正交组合。enabled=false 时每层取第一个 variant(基线)
  experiment:
    enabled: ${EXPERIMENT_ENABLED:true}
    layers:
      recall:
        salt: recall-2026a
        variants:
          - name: base
            weight: 50
            params:
              channels: "VECTOR,I2I,HOT,TAG"
          - name: plus
            weight: 50
            params:
              channels: "VECTOR,I2I,HOT,TAG,U2U,SWING,SEMANTIC,TWO_TOWER,GENERATIVE,TIGER"
      rank:
        salt: rank-2026a
        variants:
          - name: v1
            weight: 50
            params:
              strategy: v1
          - name: onnx
            weight: 50
            params:
              strategy: onnx
      rerank:
        salt: rerank-2026a
        variants:
          - name: diversity
            weight: 50
            params:
              strategy: diversity
              maxSameCategory: "3"
          - name: mmr
            weight: 50
            params:
              strategy: mmr
              lambda: "0.7"
      # 广告分层 A/B(docs/05):由广告链路单独消费(不进推荐 bucketTag);变体覆盖 reserve-price 等,
      # ad_event.ad_bucket 落库,ad-report 按桶对比 CTR/收入/eCPM。
      ad:
        salt: ad-2026a
        variants:
          - name: base
            weight: 50
            params:
              reserve-price: "0.05"
          - name: high-reserve
            weight: 50
            params:
              reserve-price: "0.15"

# 弹性护栏(S3):Gemini embedding 外呼熔断器。连续失败/超时达阈值即熔断,快速失败到降级(纯词法),
# 半开态自动探活恢复;RestClient 已有 connect/read 超时(Q4),此处补"重复失败别再苦等"。
resilience4j:
  circuitbreaker:
    instances:
      gemini-embedding:
        sliding-window-size: 20
        minimum-number-of-calls: 10          # 攒够 10 次调用才评估失败率
        failure-rate-threshold: 60           # 失败率 ≥60% → 熔断
        wait-duration-in-open-state: 30s     # 熔断后 30s 转半开探活
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: true
      # LLM query 理解(generateContent)熔断:同步外呼在 query 链路最前端,Gemini 慢/挂时快速失败到词法兜底,
      # 不因它每请求苦等(read 3s × 重试退避)拖垮 search/search-ads/feed。仅 LLM_ENABLED=true 时才有调用。
      gemini-llm:
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 60
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: true
      # E7:pgvector VECTOR 召回熔断。pg 宕机时快速失败到空(其它召回路兜底),避免每请求苦等召回超时。
      pgvector-recall:
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 60
        wait-duration-in-open-state: 15s
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: true
      # P1 跨进程 gRPC 熔断:下游(ad-serving/content/user)故障时快速失败到降级(无广告 feed / 空 hydrate / 冷启动),
      # 不因跨进程故障级联拖垮推荐主链路。deadline(recsys.grpc.deadline-ms)界定单调用时长,此处管熔断 + 半开探活。
      ad-serving-grpc: &grpc-cb
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 15s
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: true
      content-grpc: *grpc-cb
      user-grpc: *grpc-cb
  # P1 弹性:gRPC 幂等读(searchAds/findByIds/getInterests)瞬时错误重试。Retry 为最外层切面(包住 CircuitBreaker):
  # 仅 UNAVAILABLE/DEADLINE_EXCEEDED 重试(GrpcRetryablePredicate),UNAUTHENTICATED/参数错/熔断快速失败不重试;
  # 重试耗尽或不可重试才落各 gateway 的降级 fallback。非幂等写(计费/兴趣写)不挂 @Retry,避免重复副作用。
  retry:
    instances:
      ad-serving-grpc: &grpc-retry
        max-attempts: 2                # 首次 + 1 次重试(跨进程瞬断兜一手,不放大延迟)
        wait-duration: 50ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exception-predicate: com.recsys.proto.grpc.GrpcRetryablePredicate
      content-grpc: *grpc-retry
      user-grpc: *grpc-retry

management:
  endpoints:
    web:
      exposure:
        # 修复:原缺 exposure 层级 → include 挂在 web 下无效 → 只暴露默认 health,prometheus/metrics 端点缺失。
        # refresh(P4):手动触发 /actuator/refresh 重绑配置(Nacos 自动推送外的兜底手段)。
        # env(P4):查已解析配置值(观测 Nacos 热更前后取值);生产仍受安全链保护(非 permit-paths,需内部令牌)。
        include: health,info,metrics,prometheus,refresh,env
  endpoint:
    env:
      show-values: always   # P4:/actuator/env 显示配置值(Boot3 默认 ****** 脱敏);观测 Nacos 热更前后取值,dev 观测用
    health:
      # 暴露 k8s 探针端点 /actuator/health/{liveness,readiness}
      probes:
        enabled: true
      show-details: when_authorized   # P0:仅向已认证用户展示健康明细,避免向匿名泄漏内部状态
      group:
        # readiness 组纳入模型就绪探针(E4):模型策略但模型没加载 → readiness DOWN,k8s 不导流
        readiness:
          include: readinessState,modelReadiness
  # 分布式追踪:无后端时默认不采样；scripts/dev-local.sh obs 自动切到全采，生产按 QPS 设为 0.01~0.1。
  # 要导出 span 到后端:加 opentelemetry-exporter-otlp 依赖 + management.otlp.tracing.endpoint 指向 Tempo/Jaeger。
  tracing:
    sampling:
      probability: ${TRACING_SAMPLE:0.0}
  # P2:OTLP 导出 span 到 Tempo；仅在 TRACING_SAMPLE>0 时产生上报，OTLP_ENDPOINT 可覆盖。
  otlp:
    tracing:
      endpoint: ${OTLP_ENDPOINT:http://localhost:4318/v1/traces}
