server:
  port: 8081

spring:
  application:
    name: recsys-rec-engine
  datasource:
    url: jdbc:postgresql://${PG_HOST:localhost}:${PG_PORT:5432}/${PG_DB:recsys}
    username: ${PG_USER:recsys}
    password: ${PG_PASSWORD:recsys}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

# 推荐链路可调参数(生产可迁移到 Nacos 配置中心热更)
recsys:
  recall:
    quota:
      vector: 200
      i2i: 100
      hot: 50
      tag: 50
      u2u: 100
      swing: 100
      semantic: 100
      cold: 100
      cold-per-category: 5
  rank:
    # v1=规则打分, onnx=LightGBM 模型, deepfm=DeepFM 深度模型(失败均回退规则)
    strategy: ${RANK_STRATEGY:v1}
    onnx-model-path: classpath:model/model.onnx
    deepfm-model-path: classpath:model/model_deepfm.onnx
    rank-schema-path: classpath:model/rank_schema.json
    category-vocab-path: classpath:model/category_vocab.json
  rerank:
    max-same-category: 3
  filter:
    # 已看过滤:从召回结果剔除用户已正反馈(CLICK/LIKE/PLAY/RATING)过的物品
    seen-enabled: true
  cache:
    rec-ttl-seconds: 300
  embedding:
    dimension: 768
  cold-start:
    # 行为数 < 阈值且无用户向量 → 冷启动(走类目探索 + 强多样性重排)
    min-behaviors: 5
    rerank-max-same-category: 1
  # 分层 A/B:recall/rank/rerank 各自独立分桶,可正交组合。enabled=false 时每层取第一个 variant(基线)
  experiment:
    enabled: ${EXPERIMENT_ENABLED:true}
    layers:
      recall:
        salt: recall-2026a
        variants:
          - name: base
            weight: 50
            params:
              channels: "VECTOR,I2I,HOT,TAG"
          - name: plus
            weight: 50
            params:
              channels: "VECTOR,I2I,HOT,TAG,U2U,SWING,SEMANTIC"
      rank:
        salt: rank-2026a
        variants:
          - name: v1
            weight: 50
            params:
              strategy: v1
          - name: onnx
            weight: 50
            params:
              strategy: onnx
      rerank:
        salt: rerank-2026a
        variants:
          - name: diversity
            weight: 50
            params:
              strategy: diversity
              maxSameCategory: "3"
          - name: mmr
            weight: 50
            params:
              strategy: mmr
              lambda: "0.7"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
