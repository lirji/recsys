server:
  port: 8082
  # Casdoor 登录令牌及网关透传头可能超过 Tomcat 默认 8KB;与入口 nginx 的单头上限保持一致。
  max-http-request-header-size: ${MAX_HTTP_REQUEST_HEADER_SIZE:64KB}

spring:
  application:
    name: recsys-behavior
  # P4 配置中心:从 Nacos 拉热更配置(dataId=recsys-behavior.yml);optional: → 不可达退本地 yml,无 Nacos 也能起。
  config:
    import: "optional:nacos:recsys-behavior.yml"
  # P0 微服务化:Nacos 服务发现。默认开(NACOS_DISCOVERY=true)→ 注册,供网关 lb://recsys-behavior 解析;
  # 无 Nacos 的纯本地跑显式设 NACOS_DISCOVERY=false 退回。
  cloud:
    nacos:
      config:
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
        file-extension: yaml
        namespace: ${NACOS_NAMESPACE:}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        refresh-enabled: true
      discovery:
        enabled: ${NACOS_DISCOVERY:true}
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        namespace: ${NACOS_NAMESPACE:}
  datasource:
    # #3 物理拆库:behavior 上下文可独占自有库。BEHAVIOR_PG_DB 未设 → 退回 PG_DB → recsys(默认不变);
    # 设 BEHAVIOR_PG_DB=recsys_behavior 即 behavior 写自有库(DB-per-service),其它服务/离线不受影响。
    url: jdbc:postgresql://${PG_HOST:localhost}:${PG_PORT:5432}/${BEHAVIOR_PG_DB:${PG_DB:recsys}}
    username: ${PG_USER:recsys}
    password: ${PG_PASSWORD:recsys}
    driver-class-name: org.postgresql.Driver
    # P1 弹性:连接池超时,避免 DB 卡顿时线程无限等待连接
    hikari:
      connection-timeout: ${HIKARI_CONNECTION_TIMEOUT:3000}
      validation-timeout: 2000
      max-lifetime: 1800000
      keepalive-time: 300000
  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
  data:
    # 回查曝光分桶归因键(expo:{user}:{item}),算在线分桶 CTR
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      # P1 弹性:Redis 命令/连接超时,避免 Redis 抖动时请求线程挂死
      timeout: ${REDIS_TIMEOUT:2000ms}
      connect-timeout: ${REDIS_CONNECT_TIMEOUT:2000ms}

recsys:
  # P0 安全:行为上报须携带网关签发的内部令牌身份(仅健康探针放行)。RECSYS_SECURITY_ENABLED=false 可关。
  security:
    enabled: ${RECSYS_SECURITY_ENABLED:true}
    internal-secret: ${RECSYS_INTERNAL_SECRET:recsys-dev-internal-secret-change-me}
    permit-paths:
      - /actuator/health/**
      - /actuator/info
      - /actuator/prometheus
  behavior:
    # true=写 Kafka, false=直接入库(v1 可先 false,不依赖 Kafka)
    use-kafka: ${BEHAVIOR_USE_KAFKA:false}
    topic: behavior-events
    # P4:入库之外额外发 behavior-events(供 rec-engine 已看读模型等消费)。默认关,不改 use-kafka 语义。
    publish-events: ${BEHAVIOR_PUBLISH_EVENTS:false}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
