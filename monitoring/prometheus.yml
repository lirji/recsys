# Prometheus 抓取配置:抓宿主机上运行的 recsys 服务的 /actuator/prometheus。
# Java 服务在宿主机直接 mvn spring-boot:run,容器内用 host.docker.internal 访问宿主机。
global:
  scrape_interval: 5s
  evaluation_interval: 5s

# 告警规则 + SLO(recsys 在线指标)
rule_files:
  - /etc/prometheus/alert-rules.yml

# 告警路由到 Alertmanager(obs profile 一并起)
alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: recsys-rec-engine
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8081"]
        labels:
          application: recsys-rec-engine

  - job_name: recsys-behavior
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8082"]
        labels:
          application: recsys-behavior
