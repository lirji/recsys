# Alertmanager 配置(教学最小版)。生产在 receivers 里接 Slack/钉钉/飞书/PagerDuty webhook。
route:
  receiver: default
  group_by: ['alertname', 'severity']
  group_wait: 30s          # 首次成组前等一会,聚合同类告警
  group_interval: 5m
  repeat_interval: 4h      # 未恢复的告警重复提醒间隔
  routes:
    - matchers: [severity="critical"]
      receiver: default
      repeat_interval: 1h  # critical 更频繁重提

receivers:
  - name: default
    # P2:投递到本地 webhook-logger(obs profile 一并起),把告警打到其日志——演示生产 Slack/钉钉/飞书 的等价投递面。
    # 生产改成 slack_configs / 企业 webhook 即可,路由/分组/抑制策略不变。
    webhook_configs:
      - url: 'http://webhook-logger:5001/'
        send_resolved: true
