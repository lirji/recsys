# Alertmanager 配置(教学最小版)。生产在 receivers 里接 Slack/钉钉/飞书/PagerDuty webhook。
route:
  receiver: default
  group_by: ['alertname', 'severity']
  group_wait: 30s          # 首次成组前等一会,聚合同类告警
  group_interval: 5m
  repeat_interval: 4h      # 未恢复的告警重复提醒间隔
  routes:
    - matchers: [severity="critical"]
      receiver: default
      repeat_interval: 1h  # critical 更频繁重提

receivers:
  - name: default
    # 教学环境默认不外发(只在 Alertmanager UI :9093 可见)。生产改成例如:
    # slack_configs:
    #   - api_url: <webhook>
    #     channel: '#recsys-alerts'
    # 或 webhook_configs: [{ url: 'http://your-notifier/hook' }]
