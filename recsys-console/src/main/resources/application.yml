server:
  port: 8090

spring:
  application:
    name: recsys-console
  # P4 配置中心:从 Nacos 拉热更配置(dataId=recsys-console.yml);optional: → 不可达退本地 yml,无 Nacos 也能起。
  config:
    import: "optional:nacos:recsys-console.yml"
  # P0 微服务化:Nacos 服务发现。默认开(NACOS_DISCOVERY=true)→ 注册,供网关 lb://recsys-console 解析;
  # 无 Nacos 的纯本地跑显式设 NACOS_DISCOVERY=false 退回。
  cloud:
    nacos:
      config:
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
        file-extension: yaml
        namespace: ${NACOS_NAMESPACE:}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        refresh-enabled: true
      discovery:
        enabled: ${NACOS_DISCOVERY:true}
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        namespace: ${NACOS_NAMESPACE:}
  datasource:
    url: jdbc:postgresql://${PG_HOST:localhost}:${PG_PORT:5432}/${PG_DB:recsys}
    username: ${PG_USER:recsys}
    password: ${PG_PASSWORD:recsys}
    driver-class-name: org.postgresql.Driver
    hikari:
      # 不因启动时连不上 DB 而失败 —— console 允许无 DB 启动,报表回退读本地 CSV(优雅降级)
      initialization-fail-timeout: -1
      minimum-idle: 0
      # P1 弹性:连接池超时
      connection-timeout: ${HIKARI_CONNECTION_TIMEOUT:3000}
      validation-timeout: 2000
      max-lifetime: 1800000
  # 用户360 聚合在线实时态(rt:user / rt:user:seq / seen / cache:rec)。短超时快速失败,
  # Redis 不可达时用户360 只返回 DB 部分(UserProfileService 内 try/catch 降级,不 500)。
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: ${REDIS_TIMEOUT:800ms}
      connect-timeout: ${REDIS_CONNECT_TIMEOUT:500ms}

recsys:
  # P0 安全:控制台 BFF 是只读报表接口,放行 /api/console/**(网关侧亦公开 GET);健康探针放行。
  security:
    enabled: ${RECSYS_SECURITY_ENABLED:true}
    internal-secret: ${RECSYS_INTERNAL_SECRET:recsys-dev-internal-secret-change-me}
    permit-paths:
      - /actuator/health/**
      - /actuator/info
      - /actuator/prometheus
      - /api/console/**
  console:
    # 离线报表回退目录:主读 eval_report 表,表缺失/无数据时解析本地 eval/*.csv。
    # dev 下 console 进程 CWD=recsys-console,指向兄弟模块 recsys-offline/eval。
    eval-dir: ${EVAL_DIR:../recsys-offline/eval}
    # 系统总览的真实实时指标:查 Prometheus(obs profile,默认 localhost:9090)求推荐/广告链路 P99 延迟与 QPS。
    # 观测栈未起时优雅降级(前端不显示延迟指标,仍展示健康态)。PromQL 可覆盖,默认对齐 recsys.recommend.duration 计时器。
    metrics:
      enabled: ${SYSTEM_METRICS_ENABLED:true}
      prometheus-url: ${PROMETHEUS_URL:http://localhost:9090}
      connect-timeout-ms: ${SYSTEM_METRICS_CONNECT_TIMEOUT_MS:400}
      read-timeout-ms: ${SYSTEM_METRICS_READ_TIMEOUT_MS:800}
    health:
      connect-timeout-ms: ${SYSTEM_HEALTH_CONNECT_TIMEOUT_MS:300}
      read-timeout-ms: ${SYSTEM_HEALTH_READ_TIMEOUT_MS:500}
      targets:
        - service: recsys-console
          name: 控制台 BFF
          kind: app
          url: ${RECSYS_CONSOLE_URL:http://localhost:8090}
        - service: recsys-gateway
          name: 网关
          kind: app
          url: ${RECSYS_GATEWAY_URL:http://localhost:8080}
        - service: recsys-rec-engine
          name: 推荐编排
          kind: app
          url: ${RECSYS_REC_ENGINE_URL:http://localhost:8081}
        - service: recsys-behavior
          name: 行为采集
          kind: app
          url: ${RECSYS_BEHAVIOR_URL:http://localhost:8082}
        - service: recsys-advertiser
          name: 广告主后台
          kind: app
          url: ${RECSYS_ADVERTISER_URL:http://localhost:8083}
        - service: recsys-ad-serving
          name: 广告投放内部服务
          kind: app
          url: ${RECSYS_AD_SERVING_URL:http://localhost:8085}
        - service: recsys-content-service
          name: 内容内部服务
          kind: app
          url: ${RECSYS_CONTENT_SERVICE_URL:http://localhost:8086}
        - service: recsys-user-service
          name: 用户内部服务
          kind: app
          url: ${RECSYS_USER_SERVICE_URL:http://localhost:8087}
        - service: recsys-offline
          name: 离线作业
          kind: job
          passive-status: JOB_ONLY
          passive-message: 按需运行,不按常驻 HTTP 服务探测。
        - service: recsys-streaming
          name: 实时特征作业
          kind: job
          passive-status: LOCAL_CLUSTER_JOB
          passive-message: Flink 作业按需启动,不按 HTTP 服务探测。

# P2 可观测:暴露 prometheus 指标(供 Prometheus 抓取);健康明细仅授权可见。
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when_authorized
