# P0 微服务化 —— discovery profile:网关改用 lb://<service-name>(Nacos 服务发现 + Spring Cloud LoadBalancer)。
# 启用:`--spring.profiles.active=discovery`(容器化 compose 的 apps profile 已默认带上)。
# 覆盖 application.yml 的静态 http://localhost 路由(routes 是 list 属性,整体替换而非逐条合并)。
# 前提:各目标服务已以 NACOS_DISCOVERY=true 注册到同一 Nacos(见各服务 spring.cloud.nacos.discovery)。
#
# 注:ad-serving 不在网关直路由内 —— 广告计费 /api/ad/click|conversion 仍经 rec-engine(grpc 模式内部转 gRPC),
# 保持"回滚开关只在 rec-engine 一处"。ad-serving 的注册仅供 rec-engine 侧 discovery:///(可选)使用。
spring:
  cloud:
    nacos:
      discovery:
        enabled: true   # discovery profile 下强制开:网关必须能解析 lb://
    gateway:
      routes:
        - id: rec-engine
          uri: lb://recsys-rec-engine
          predicates:
            - Path=/api/recommend/**,/api/search/**,/api/search-ads/**,/api/feed/**,/api/query/**,/api/user/**,/api/ad/**,/api/experiment/**
        - id: behavior
          uri: lb://recsys-behavior
          predicates:
            - Path=/api/behavior/**
        - id: advertiser
          uri: lb://recsys-advertiser
          predicates:
            - Path=/api/advertiser/**
        - id: console
          uri: lb://recsys-console
          predicates:
            - Path=/api/console/**
