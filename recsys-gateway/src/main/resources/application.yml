server:
  port: 8080
  # Casdoor access_token 常达 8-9KB(内嵌完整 user 对象),超 Netty 默认 8KB header 上限会在验签前被拒。
  # 仅 casdoor 边缘模式需要,legacy 自签 JWT 很小,但常开无副作用。
  max-http-request-header-size: 64KB

spring:
  application:
    name: recsys-gateway
  # P4 配置中心:从 Nacos 拉热更配置(dataId=recsys-gateway.yml);optional: → 不可达退本地 yml,无 Nacos 也能起。
  config:
    import: "optional:nacos:recsys-gateway.yml"
  # E7:网关限流(Redis 令牌桶)是 opt-in 的 `ratelimit` profile —— 默认关,不影响无 Redis 的本地运行。
  # 开启:`--spring.profiles.active=ratelimit`(需 Redis);限流配置见 application-ratelimit.yml。
  cloud:
    # P0 微服务化:Nacos 服务发现默认开(NACOS_DISCOVERY=true)→ 注册到 Nacos;下面路由默认走 lb://(客户端负载均衡,需 Nacos)。
    # 纯本地无 Nacos:`--spring.profiles.active=static`(见 application-static.yml)切回静态 http://localhost 路由 + 关服务发现
    # (dev-local.env 设 NACOS_DISCOVERY=false 时 dev-local.sh 会自动给网关带上 static profile)。
    nacos:
      config:
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
        file-extension: yaml
        namespace: ${NACOS_NAMESPACE:}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        refresh-enabled: true
      discovery:
        enabled: ${NACOS_DISCOVERY:true}
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        namespace: ${NACOS_NAMESPACE:}
    gateway:
      routes:
        # rec-engine 对外全部入口 → 8081(补全:此前只路由了 /api/recommend,其余落到 /**→web 不可达)。
        # 含:推荐 / 搜索 / 搜索广告 / 混排 feed / query 理解 / 冷启动兴趣 / 广告点击·转化(/api/ad/*)。
        # 注:/api/ad/** 与 /api/advertiser/**(→8083)不重叠(第二段 ad≠advertiser),互不误路由。
        - id: rec-engine
          uri: lb://recsys-rec-engine
          predicates:
            - Path=/api/recommend/**,/api/search/**,/api/search-ads/**,/api/feed/**,/api/query/**,/api/user/**,/api/ad/**,/api/experiment/**
        # 行为上报 → behavior
        - id: behavior
          uri: lb://recsys-behavior
          predicates:
            - Path=/api/behavior/**
        # 广告主管理(广告主/广告/创意/竞价词 CRUD + 报表)→ advertiser
        # 全在 /api/advertiser/** 命名空间下,不与 rec-engine 的 /api/ad/click、/api/ad/conversion 冲突
        - id: advertiser
          uri: lb://recsys-advertiser
          predicates:
            - Path=/api/advertiser/**
        # 控制台后端(console-api):离线报表读取等 BFF 接口 → console
        # 前后端分离后前端不再由网关托管(由 nginx 同源托管并反代 /api 到本网关),故去掉旧的 /**→web 兜底路由。
        - id: console
          uri: lb://recsys-console
          predicates:
            - Path=/api/console/**

# P0 边缘认证:网关校验终端 JWT(edge-secret 签发)+ 签发内部令牌(internal-secret)传播给下游。
# 三个密钥/开关须与下游服务一致(同 env);生产从密钥分层注入,勿用默认值。关闭安全:RECSYS_SECURITY_ENABLED=false。
recsys:
  security:
    enabled: ${RECSYS_SECURITY_ENABLED:true}
    internal-secret: ${RECSYS_INTERNAL_SECRET:recsys-dev-internal-secret-change-me}
    edge-secret: ${RECSYS_EDGE_SECRET:recsys-dev-edge-jwt-secret-change-me-32bytes+}
    edge-ttl-seconds: ${RECSYS_EDGE_TTL:3600}
    # 统一登录平台(Casdoor)边缘模式,默认关=保持自签 HS256 演示登录。开启后终端 JWT 改 Casdoor JWKS 验签,
    # 内部令牌 subject=Casdoor sub(下游判权主体自动跟随)。见 docs/09 与 auth-platform docs/统一登录平台接入手册.md。
    casdoor:
      enabled: ${RECSYS_EDGE_CASDOOR:false}
      jwk-set-uri: ${CASDOOR_JWKS:http://localhost:8000/.well-known/jwks}
      issuer: ${CASDOOR_ISSUER:http://localhost:8000}
      organization: ${CASDOOR_ORG:recsys}   # 租户钉死:token owner 必须是本 org,跨租户一律 401
      audiences: ${CASDOOR_AUDIENCES:ragshared0client00000001}   # 精确 client_id 或 shared base(按 <base>-org-<owner> 家族放行)
      # group-roles 默认 admins→ADMIN、advertisers→ADVERTISER(代码默认,可覆盖)

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  # 默认模式网关不使用 Redis(仅 opt-in 的 ratelimit profile 用)→ 关掉 redis 健康探针,避免误报 health DOWN
  # (自动装配的 RedisReactiveHealthIndicator 缺 spring.data.redis 配置时连默认 6379,而实际 redis 在 REDIS_PORT)。
  health:
    redis:
      enabled: false
  # P2 可观测:网关起 trace(链路头)+ 导出到 Tempo。
  tracing:
    sampling:
      probability: ${TRACING_SAMPLE:1.0}
  otlp:
    tracing:
      endpoint: ${OTLP_ENDPOINT:http://localhost:4318/v1/traces}
