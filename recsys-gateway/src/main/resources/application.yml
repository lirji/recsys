server:
  port: 8080

spring:
  application:
    name: recsys-gateway
  cloud:
    gateway:
      routes:
        # 推荐主入口 → rec-engine
        - id: rec-engine
          uri: http://localhost:8081
          predicates:
            - Path=/api/recommend/**
        # 行为上报 → behavior
        - id: behavior
          uri: http://localhost:8082
          predicates:
            - Path=/api/behavior/**
        # 广告主管理(广告主/广告/创意/竞价词 CRUD + 报表)→ advertiser
        # 全在 /api/advertiser/** 命名空间下,不与 rec-engine 的 /api/ad/click、/api/ad/conversion 冲突
        - id: advertiser
          uri: http://localhost:8083
          predicates:
            - Path=/api/advertiser/**
        # 演示前端 → web
        - id: web
          uri: http://localhost:8090
          predicates:
            - Path=/**

management:
  endpoints:
    web:
      exposure:
        include: health,info
