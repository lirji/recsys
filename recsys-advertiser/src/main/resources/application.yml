server:
  port: 8083

spring:
  application:
    name: recsys-advertiser
  # P4 配置中心:从 Nacos 拉热更配置(dataId=recsys-advertiser.yml);optional: → 不可达退本地 yml,无 Nacos 也能起。
  config:
    import: "optional:nacos:recsys-advertiser.yml"
  # P0 微服务化:Nacos 服务发现。默认开(NACOS_DISCOVERY=true)→ 注册,供网关 lb://recsys-advertiser 解析;
  # 无 Nacos 的纯本地跑显式设 NACOS_DISCOVERY=false 退回。
  cloud:
    nacos:
      config:
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
        file-extension: yaml
        namespace: ${NACOS_NAMESPACE:}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        refresh-enabled: true
      discovery:
        enabled: ${NACOS_DISCOVERY:true}
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        namespace: ${NACOS_NAMESPACE:}
  datasource:
    # 分库分表:走 ShardingSphere-JDBC 驱动,真实数据源 / 分片规则在 sharding.yaml
    driver-class-name: org.apache.shardingsphere.driver.ShardingSphereDriver
    # placeholder-type=environment:让 sharding.yaml 里的 $${PG_HOST::}/$${PG_PORT::} 等从环境变量解析
    # (ShardingSphere 5.5 默认 placeholder-type=none 不替换 → 端口为空 NumberFormatException)。
    url: jdbc:shardingsphere:classpath:sharding.yaml?placeholder-type=environment
  data:
    # 同步竞价词倒排(bidword:inv:{keyword})+ 报表读当日已耗预算(ad:budget:{adv}:{day})
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      # P1 弹性:Redis 命令/连接超时(pacing/预算读走 Redis,抖动时快速失败退降级)
      timeout: ${REDIS_TIMEOUT:2000ms}
      connect-timeout: ${REDIS_CONNECT_TIMEOUT:2000ms}
  # P1b 广告目录事件化:发布 ad-catalog-events(KafkaTemplate 懒连接,不开则不连)。
  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

# #3 ad-serving 拆库:仅 recsys.ad.report.source=grpc 时 GrpcAdReportReader 建通道调 ad-serving。
grpc:
  client:
    ad-serving:
      address: ${AD_SERVING_GRPC:static://localhost:9095}
      negotiation-type: plaintext

recsys:
  # P0 安全:广告主写侧管理面全部需 ADVERTISER/ADMIN(URL 层认证 + 控制器 @PreAuthorize 双闸)。
  security:
    enabled: ${RECSYS_SECURITY_ENABLED:true}
    internal-secret: ${RECSYS_INTERNAL_SECRET:recsys-dev-internal-secret-change-me}
    permit-paths:
      - /actuator/health/**
      - /actuator/info
      - /actuator/prometheus
  ad:
    catalog:
      # 是否发布广告目录事件(P1b)。默认关:与 bidword:inv 同步维护并行的双写过渡,开了才发 Kafka。
      publish-events: ${AD_CATALOG_PUBLISH:false}
    # #3 ad-serving 物理拆库:报表 ad_event 聚合来源。db(默认,直读 ad_event,回滚落点)| grpc(调 ad-serving GetAdEventStats)。
    report:
      source: ${AD_REPORT_SOURCE:db}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
