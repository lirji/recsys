# rec-engine 部署清单模板(E4)。其余 [app] 照此复制改 image/port/env 即可。
# 镜像构建:docker build --build-arg MODULE=recsys-rec-engine --build-arg PORT=8081 -t recsys/rec-engine:latest .
# 关键:readiness 探针打 /actuator/health/readiness —— 含 ModelReadinessHealthIndicator,
#       模型策略但模型没加载时判 DOWN,滚动发布时坏模型不会接管流量(见 recsys-rank RankRouter.activeStrategyReady)。
apiVersion: apps/v1
kind: Deployment
metadata:
  name: recsys-rec-engine
  labels: { app: recsys-rec-engine }
spec:
  replicas: 2
  selector:
    matchLabels: { app: recsys-rec-engine }
  template:
    metadata:
      labels: { app: recsys-rec-engine }
    spec:
      containers:
        - name: rec-engine
          image: recsys/rec-engine:latest
          ports:
            - containerPort: 8081
          env:
            - { name: PG_HOST, value: "postgres" }
            - { name: PG_PORT, value: "5432" }
            - { name: REDIS_HOST, value: "redis" }
            - { name: REDIS_PORT, value: "6379" }
            - { name: RANK_STRATEGY, value: "v1" }
            - { name: SERVER_PORT, value: "8081" }
          resources:
            requests: { cpu: "500m", memory: "768Mi" }
            limits: { cpu: "2", memory: "1536Mi" }
          # liveness:进程活着即存活(不因模型缺失重启,避免崩溃循环)
          livenessProbe:
            httpGet: { path: /actuator/health/liveness, port: 8081 }
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          # readiness:含模型就绪门控 —— 未就绪不进 Service Endpoints(不导流)
          readinessProbe:
            httpGet: { path: /actuator/health/readiness, port: 8081 }
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
          # startup:给模型加载留足冷启动时间,期间不触发 liveness 误杀
          startupProbe:
            httpGet: { path: /actuator/health/liveness, port: 8081 }
            failureThreshold: 30
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: recsys-rec-engine
spec:
  selector: { app: recsys-rec-engine }
  ports:
    - port: 80
      targetPort: 8081
