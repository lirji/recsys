apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# 全部资源落 recsys 命名空间;overlays 通过 patch/replicas/images 做环境差异化。
namespace: recsys

labels:
  - pairs:
      app.kubernetes.io/part-of: recsys
    includeSelectors: false

resources:
  - namespace.yaml
  - config.yaml
  - online.yaml
  - support.yaml
  - internal.yaml
  - ingress.yaml
  - hpa.yaml
